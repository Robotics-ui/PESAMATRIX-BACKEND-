<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PesaMatrix — Set Your Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .logo-text { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .logo-sub { font-size: 0.75rem; color: #64748b; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.4rem; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 1.6rem; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .field { margin-bottom: 1.1rem; }
    input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert {
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error { background: #2d1515; border: 1px solid #7f1d1d; color: #fca5a5; display: block; }
    .alert.success { background: #0f2d1a; border: 1px solid #14532d; color: #86efac; display: block; }
    .alert.warning { background: #2d1f00; border: 1px solid #78350f; color: #fcd34d; display: block; }
    .hint { font-size: 0.78rem; color: #475569; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">₿</div>
      <div>
        <div class="logo-text">PesaMatrix</div>
        <div class="logo-sub">Cloud Engine v2.0</div>
      </div>
    </div>

    <h1>Set Your Password</h1>
    <p class="subtitle">You're using a temporary password. Please set a new one to continue.</p>

    <div class="alert warning" id="warningBanner">
      For security, your temporary password must be changed before you can access the platform.
    </div>

    <div class="alert" id="alert"></div>

    <form id="changeForm">
      <div class="field">
        <label>Current Password</label>
        <input type="password" id="currentPassword" placeholder="Your temporary password" required />
      </div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8" />
        <p class="hint">Minimum 8 characters.</p>
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat new password" required />
      </div>
      <button class="btn" type="submit" id="submitBtn">Update Password</button>
    </form>
  </div>

  <script>
    const token = localStorage.getItem('pm_token');
    if (!token) {
      window.location.href = '/';
    }

    document.getElementById('changeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      const btn = document.getElementById('submitBtn');
      alertEl.className = 'alert';
      alertEl.textContent = '';

      const newPassword = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (newPassword !== confirm) {
        alertEl.className = 'alert error';
        alertEl.textContent = 'New passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            currentPassword: document.getElementById('currentPassword').value,
            newPassword
          })
        });
        const data = await res.json();

        if (!res.ok) {
          alertEl.className = 'alert error';
          alertEl.textContent = data.error || 'Failed to update password.';
          return;
        }

        document.getElementById('warningBanner').style.display = 'none';
        alertEl.className = 'alert success';
        alertEl.textContent = 'Password updated! Redirecting to sign in…';

        localStorage.removeItem('pm_token');
        localStorage.removeItem('pm_user');
        setTimeout(() => { window.location.href = '/'; }, 1500);
      } catch (err) {
        alertEl.className = 'alert error';
        alertEl.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
